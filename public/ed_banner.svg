<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD700"/>
            <stop offset="100%" stop-color="#FFC000"/>
        </linearGradient>
    </defs>
    <rect width="1200" height="400" fill="url(#bg)"/>
    
    <!-- Decorative background elements -->
    <circle cx="1000" cy="200" r="150" fill="#E30010" opacity="0.05"/>
    <circle cx="1150" cy="350" r="120" fill="#000000" opacity="0.05"/>
    <rect x="800" y="-50" width="100" height="500" transform="rotate(25 800 -50)" fill="#FFFFFF" opacity="0.1"/>
    
    <!-- Content -->
    <text x="100" y="160" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="65" fill="#000000">MASTER GERMAN,</text>
    <text x="100" y="240" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-style="italic" font-size="65" fill="#E30010">EGAL WIE!</text>
    <text x="100" y="300" font-family="Arial, sans-serif" font-size="26" fill="#333333">Interactive online courses and resources for all levels.</text>
    
    <!-- CTA Button -->
    <rect x="800" y="150" width="300" height="80" rx="40" fill="#E30010"/>
    <text x="950" y="200" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#FFFFFF" text-anchor="middle">GET STARTED NOW</text>
</svg>